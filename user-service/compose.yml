services:
  api-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:18-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d test"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgre-data
    restart: always
  migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ../migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "${DATABASE_URL}",
      "up"
    ]
    depends_on:
      db:
        condition: service_healthy